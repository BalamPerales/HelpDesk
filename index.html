<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Help Desk</title>
    
    <link rel="stylesheet" href="./public/bootstrap/bootstrap.min.css">
    
    <link rel="stylesheet" href="./public/fontawesome/css/all.min.css">
    
    <link rel="stylesheet" href="./public/datatable/dataTables.bootstrap5.min.css">
    
    <link rel="stylesheet" href="./public/css/login.css">

</head>
<body class="bg-light">

    <div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
        
        <div class="card p-5 shadow-sm" style="width: 100%; max-width: 450px; border-radius: 12px;">
            <h2 class="text-center mb-4 text-dark">Help Desk</h2>
            
            <form>
                <div class="mb-3">
                    <label for="usuario" class="form-label text-dark">Usuario:</label>
                    <input type="email" class="form-control" id="usuario" placeholder="Ej. bperales@empresa.com">
                </div>
                
                <div class="mb-4">
                    <label for="password" class="form-label text-dark">Contraseña:</label>
                    <input type="password" class="form-control" id="password" placeholder="********">
                </div>
                
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-info text-white fw-bold">Iniciar sesión</button>
                </div>
                
                <div class="text-center mt-4">
                    <a href="#" class="text-secondary text-decoration-none small">¿Tienes algún problema?</a>
                </div>
            </form>
            
        </div>
    </div>

    <script src="./public/jquery/jquery-3.6.0.min.js"></script>
    
    <script src="./public/bootstrap/bootstrap.min.js"></script>
    
    <script src="./public/datatable/jquery.dataTables.min.js"></script>
    <script src="./public/datatable/dataTables.bootstrap5.min.js"></script>
    
    <script src="./public/sweetalert2/sweetalert2@11.js"></script>

</body>
</html>
