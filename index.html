<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="public/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="public/css/login.css" />
    <link rel="stylesheet" href="public/css/menu.css" />

    <link rel="stylesheet" href="public/css/triforce_logo.css" />
    <link rel="stylesheet" href="public/css/zelda_style.css" />

    <style>
      html,
      body {
        background-color: transparent !important;
      }
    </style>

    <title>Help Desk</title>
    <link rel="icon" href="public/img/logoicono.ico" type="image/x-icon" />
  </head>
  <body class="login-page">
    <div class="wrapper fadeInDown">
      <div id="formContent" class="zelda-card">
        <div class="fadeIn first mt-4 mb-3">
          <img
            src="public/img/logoicono.ico"
            alt="Logo Help Desk"
            style="width: 80px; height: auto"
          />
          <h1
            style="
              color: var(--zelda-gold);
              font-weight: bold;
              margin-top: 15px;
            "
          >
            Help Desk
          </h1>
        </div>

        <form id="frmLogin" method="Post" onsubmit="return loginUsuario();">
          <input
            type="text"
            id="login"
            class="fadeIn second"
            name="login"
            placeholder="username"
            required
          />
          <input
            type="password"
            id="password"
            class="fadeIn third"
            name="password"
            placeholder="password"
            required
          />
          <input
            type="submit"
            class="fadeIn fourth"
            value="Entrar"
            style="
              background-color: var(--zelda-green-light);
              border: none;
              color: white;
              font-weight: bold;
            "
          />
        </form>

        <div
          id="formFooter"
          style="
            background-color: rgba(255, 255, 255, 0.5);
            border-top: 1px solid var(--zelda-gold);
          "
        >
          <a
            class="underlineHover"
            href="#"
            data-toggle="modal"
            data-target="#modalContacto"
            style="color: var(--zelda-green-dark); font-weight: bold"
          >
            Contactar con el administrador
          </a>
        </div>
      </div>
    </div>

    <div
      class="modal fade"
      id="modalContacto"
      tabindex="-1"
      role="dialog"
      aria-labelledby="exampleModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog" role="document">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="exampleModalLabel">Contacto</h5>
            <button
              type="button"
              class="close"
              data-dismiss="modal"
              aria-label="Close"
            >
              <span aria-hidden="true">&times;</span>
            </button>
          </div>
          <div class="modal-body">
            Si no tienes una credencial llama al 557895631
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-dismiss="modal"
            >
              Cerrar
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="public/jquery/jquery-3.6.0.min.js"></script>
    <script src="public/bootstrap/popper.min.js"></script>
    <script src="public/bootstrap/bootstrap.min.js"></script>
    <script src="public/js/usuarios/login.js"></script>
    <script src="public/sweetalert2/sweetalert2@11.js"></script>
  </body>
</html>
